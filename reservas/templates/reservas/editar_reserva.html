{% extends 'reservas/base.html' %}

{% block content %}

<h2>Editar Reserva</h2>

<form method="post">
    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit" class="btn btn-warning">
        Guardar cambios
    </button>

    <a href="{% url 'lista_reservas' %}" class="btn btn-secondary">
        Cancelar
    </a>

</form>

{% endblock %}
