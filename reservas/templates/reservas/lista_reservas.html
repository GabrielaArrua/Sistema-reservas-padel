{% extends 'reservas/base.html' %}

{% block content %}

<table class="table table-striped">
    <thead>
        <tr>
            <th>Cliente</th>
            <th>Cancha</th>
            <th>Fecha</th>
            <th>Horario</th>
            <th>Acciones</th>
        </tr>
    </thead>

    <tbody>

        {% for reserva in reservas %}
        <tr>
            <td>{{ reserva.nombre_cliente }}</td>
            <td>{{ reserva.cancha }}</td>
            <td>{{ reserva.fecha }}</td>
            <td>{{ reserva.horario }}</td>

            <td>
                <a
                    href="{% url 'editar_reserva' reserva.id %}"
                    class="btn btn-warning btn-sm"
                >
                    Editar
                </a>

                <a
                    href="{% url 'eliminar_reserva' reserva.id %}"
                    class="btn btn-danger btn-sm"
                >
                    Eliminar
                </a>
            </td>
        </tr>

        {% empty %}
        <tr>
            <td colspan="4">
                No hay reservas registradas.
            </td>
        </tr>
        {% endfor %}

    </tbody>
</table>

{% endblock %}
